<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#fff;
color:#000;
}

/* TOP BAR (CLEAN BORDER FIX) */
.top-bar{
background:#0066cc;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 250px;
font-size:15px;
color:white;

/* 🔥 CLEAN FIX: remove unwanted line effect */
border-bottom:0;
box-shadow:none;
outline:none;
}

/* LEFT CAPTION */
.top-caption{
font-size:17px;
font-weight:700;
letter-spacing:0.3px;
}

/* RIGHT SIDE */
.top-right{
display:flex;
align-items:center;
gap:25px;
}

/* ITEM */
.top-item{
display:flex;
align-items:center;
gap:6px;
color:white;
font-size:14px;
text-decoration:none;
}

/* NAVBAR */
.navbar{
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 10px;
border:6px solid white;
position:relative;
}

/* LOGO */
.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo-area img{
width:50px;
height:50px;
object-fit:contain;
}

.logo-area h2{
font-size:28px;
font-weight:400;
margin:0;
}

/* MENU */
.menu{
display:flex;
gap:20px;
align-items:center;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
padding:10px;
}

/* ================= DROPDOWN FIX ================= */

.dropdown{
position:relative;
display:inline-block;
}

/* IMPORTANT FIX */
.dropdown-content{
display:none;
position:absolute;
top:100%;
left:0;
margin-top:12px;

background:#fff;
min-width:260px;

border:1px solid #ddd;

/* IMPORTANT: keep mouse inside gap safe */
padding:5px 0;

z-index:99999;
}

/* ITEM CLEAN */
.dropdown-content a{
display:block;
padding:10px 14px;
font-size:15px;
color:#000;
text-decoration:none;

/* REMOVE LINE STYLE COMPLETELY */
border-bottom:none;
}

/* hover effect */
.dropdown-content a:hover{
background:#f2f2f2;
}

/* ⭐ IMPORTANT FIX: keep menu alive */
.dropdown:hover .dropdown-content,
.dropdown-content:hover{
display:block;
}

/* CART */
.cart{
position:relative;
display:flex;
align-items:center;
}

.cart img{
width:35px;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:red;
color:#fff;
width:20px;
height:20px;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('4k-new-york.jpg') center/cover no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.hero-content{
position:relative;
z-index:2;
color:#fff;
}

.hero h1{
font-size:50px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">

    <div class="top-caption">
       GLOBAL SECURE USA & DIGITAL SERVICES
    </div>

    <div class="top-right">
        @GlobalTopIt | globaltopit@gmail.com
    </div>

</div>

<!-- NAVBAR -->
<nav class="navbar container">

<div class="logo-area">
<img src="Your-paragraph-text.png">
<h2>GLOBAL TOP IT 🌐</h2>
</div>

<div class="menu">

<a href="#">Home</a>

<div class="dropdown">
    <a href="#">Bank Accounts</a>
    <div class="dropdown-content">
        <a href="bank.html">USA Bank</a>
        <a href="bank.html">UK Bank</a>
        <a href="bank.html">Verified Accounts</a>
    </div>
</div>

<div class="dropdown">
    <a href="#">Crypto Accounts</a>
    <div class="dropdown-content">
        <a href="crypto.html">Binance</a>
        <a href="crypto.html">Coinbase</a>
        <a href="crypto.html">Wallets</a>
    </div>
</div>

<div class="dropdown">
    <a href="#">Social Accounts</a>
    <div class="dropdown-content">
        <a href="social.html">TikTok</a>
        <a href="social.html">Facebook</a>
        <a href="social.html">Instagram</a>
    </div>
</div>

<a href="#">Shop</a>

<div class="cart">
    <img src="add-to-cart.png">
    <span class="cart-count">0</span>
</div>

</div>

</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Welcome To Global Top It</h1>
</div>
</section>

</body>
</html>
