<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Top It</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#fff;
color:#000;
}

/* TOP BAR (RIGHT SIDE BUT NOT CORNER) */
.top-bar{
background:#0066cc;
display:flex;
justify-content:flex-end;
gap:25px;
padding:20px 250px;
font-size:16px;
}
  
.top-bar span{
color:#fff;
font-weight:700;
}

/* MAIN WRAPPER */
.container{
max-width:1200px;
margin:auto;
}

/* NAVBAR */
.navbar{
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 10px;
border:6px solid white;
}

/* LOGO */
.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo-area img{
width:50px;
height:50px;
object-fit:contain;
}

.logo-area h2{
font-size:28px;
font-weight:400;
margin:0;
}

/* MENU */
.menu{
display:flex;
gap:25px;
align-items:center;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

.menu a:hover{
color:#0066cc;
}

/* CART ICON */
.cart img{
width:35px;
height:auto;
cursor:pointer;
}

/* HERO */
.hero{
min-height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:60px 20px;
background:url('4k-new-york.jpg') center/cover no-repeat;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0, 80, 180, 0.55);
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
color:#fff;
}

.hero p{
font-size:18px;
margin-bottom:20px;
color:#fff;
}

.btn{
padding:12px 25px;
border:none;
background:#ff00aa;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){

.navbar{
flex-direction:column;
gap:15px;
padding:15px 20px;
}

.menu{
flex-wrap:wrap;
justify-content:center;
}

.top-bar{
justify-content:center;
padding:10px 20px;
}

.hero h1{
font-size:35px;
}
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div style="background:#0066cc; color:white; display:flex; justify-content:space-between; align-items:center; padding:15px 250px; font-size:15px;">

    <div>
        Trusted Global Service with Verified USA Accounts
    </div>

    <div style="display:flex; gap:20px; align-items:center;">
        <a href="https://t.me/smmpvaexpertts" target="_blank" style="color:white; text-decoration:none;">@GlobalTopIt</a>
        <span>Globaltopit@gmail.com</span>
    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar container">

<div class="logo-area">
<img src="Your-paragraph-text.png" alt="">
<h2>GLOBAL TOP IT 🌐</h2>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Bank Accounts ⌵</a>
<a href="#">Crypto Accounts ⌵</a>
<a href="#">Social Accounts ⌵</a>
<a href="#">Shop</a>

<!-- 🔥 ONLY CART ADDED HERE -->
<div class="cart">
    <img src="add-to-cart.png" alt="Cart">
</div>

</div>

</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Welcome To Global Top It</h1>
<p>Secure digital services worldwide with trusted support and verified accounts.</p>
<button class="btn">VISIT SHOP</button>
</div>
</section>

</body>
</html>
