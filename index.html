body{
    margin:0;
    font-family:Arial;
    color:#fff;

    /* BACKGROUND */
    background:url("4k-new-york.jpg") no-repeat center center fixed;
    background-size:cover;
}

/* DARK OVERLAY */
.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.55);
}

/* HEADER (ONLY LOGO) */
.header{
    display:flex;
    justify-content:flex-start;
    align-items:center;
    padding:18px 40px;
    border-bottom:2px solid rgba(255,255,255,0.8);
    backdrop-filter:blur(6px);
}

.logo img{
    width:42px;
    height:42px;
    border-radius:6px;
}

/* HERO IMAGE */
.hero{
    text-align:center;
    margin-top:25px;
}

.hero img{
    width:280px;
    border:2px solid white;
    border-radius:10px;
}

/* CONTENT BOX */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:22px;
    padding:30px 40px;
}

.card{
    border:1px solid rgba(255,255,255,0.7);
    padding:18px;
    background:rgba(0,0,0,0.35);
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    background:rgba(0,0,0,0.55);
}

.card h3{
    border-bottom:1px solid rgba(255,255,255,0.6);
    padding-bottom:6px;
}
