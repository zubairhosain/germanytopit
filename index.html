<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    .menu {
      background: #f2f2f2;
      padding: 10px;
    }

    .menu a {
      margin-right: 15px;
      text-decoration: none;
      font-size: 18px;
      color: blue;
      cursor: pointer;
    }

    .box {
      display: none;
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h1>My Website</h1>

<!-- 🔥 Social Media Category -->
<h2 onclick="showMenu()">Social Media Accounts (Click)</h2>

<div class="menu" id="menu">
  <a onclick="show('facebook')">Facebook</a>
  <a onclick="show('instagram')">Instagram</a>
  <a onclick="show('tiktok')">TikTok</a>
</div>

<!-- 🔥 Content -->
<div id="facebook" class="box">
  <h3>Facebook Article</h3>
  <p>Facebook সম্পর্কে লেখা এখানে থাকবে</p>
</div>

<div id="instagram" class="box">
  <h3>Instagram Article</h3>
  <p>Instagram সম্পর্কে লেখা এখানে থাকবে</p>
</div>

<div id="tiktok" class="box">
  <h3>TikTok Article</h3>
  <p>TikTok সম্পর্কে লেখা এখানে থাকবে</p>
</div>

<script>
function showMenu() {
  document.getElementById("menu").style.display = "block";
}

function show(id) {
  let boxes = document.querySelectorAll(".box");

  boxes.forEach(box => {
    box.style.display = "none";
  });

  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
