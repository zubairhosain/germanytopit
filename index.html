<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germany Top It</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
}

/* TOP BAR */
.top-bar{
background:#0066cc;
display:flex;
justify-content:flex-start;
gap:30px;
padding:12px 100px; /* more spacing */
font-size:14px;
}

/* NAVBAR */
.navbar{
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 100px;
}

/* LOGO AREA (MORE RIGHT) */
.logo-area{
display:flex;
align-items:center;
gap:12px;
margin-left:90px; /* 👉 logo more right */
}

.logo-area img{
width:50px;
height:50px;
object-fit:contain;
}

.logo-area h2{
color:#111;
font-size:24px;
font-weight:bold;
}

/* MENU (SHIFTED RIGHT FROM CENTER) */
.menu{
display:flex;
gap:28px;
margin-left:auto;
margin-right:80px;
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
transition:0.3s;
}

.menu a:hover{
color:#0066cc;
}

/* HERO */
.hero{
min-height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:60px 20px;
background:url('4k-new-york.jpg') center/cover no-repeat;
}

/* BLUE OVERLAY */
.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,80,180,0.55);
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
border:none;
background:#ff00aa;
color:#fff;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

@media(max-width:768px){

.navbar{
flex-direction:column;
