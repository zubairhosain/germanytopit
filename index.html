<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germany Top It</title>

<link rel="icon" href="Your-paragraph-text.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
}

/* TOP BAR (LEFT SIDE FIX) */
.top-bar{
background:#0066cc;
display:flex;
justify-content:flex-start; /* 👉 LEFT SIDE */
gap:25px;
padding:10px 40px;
font-size:14px;
}

/* NAVBAR */
.navbar{
background:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 60px;
}

/* LOGO (MORE RIGHT) */
.logo-area{
display:flex;
align-items:center;
gap:12px;
margin-left:60px; /* 👉 আরও ডানদিকে */
}

.logo-area img{
width:50px;
height:50px;
object-fit:contain;
}

.logo-area h2{
color:#111;
font-size:24px;
font-weight:bold;
}

/* MENU (MORE LEFT) */
.menu{
display:flex;
gap:25px;
margin-right:80px; /* 👉 আরও বামদিকে */
}

.menu a{
text-decoration:none;
color:#111;
font-weight:600;
}

.menu a:hover{
color:#0066cc;
}

/* HERO (FULL BACKGROUND FIX) */
.hero{
min-height:100vh; /* 👉 FULL SCREEN FIX */
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('4k-new-york.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
max-width:700px;
margin:auto;
font-size:18px;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
border:none;
background:#ff00aa;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){

.navbar{
flex-direction:column;
gap:15px;
}

.menu{
flex-wrap:wrap;
justify-content:center;
margin-right:0;
}

.logo-area{
margin-left:0;
}

.hero h1{
font-size:35px;
}

}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
<span>Telegram: @GermanyTopIt</span>
<span>Email: germanytopit@gmail.com</span>
</div>

<!-- NAVBAR -->
<nav class="navbar">

<div class="logo-area">
<img src="Your-paragraph-text.png" alt="">
<h2>Germany Top It</h2>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Bank Accounts</a>
<a href="#">Crypto Accounts</a>
<a href="#">Social Accounts</a>
<a href="#">Shop</a>
</div>

</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Welcome To Germany Top It</h1>
<p>Secure digital services worldwide with trusted support.</p>
<button class="btn">VISIT SHOP</button>
</div>
</section>

</body>
</html>
